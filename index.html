<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Super Tic Tac Toe</h1>
        
        <div class="game-info">
            <div class="current-player">
                Current Player: <span id="current-player">X</span>
            </div>
            <div class="active-board">
                Active Board: <span id="active-board">Any</span>
            </div>
            <button id="reset-btn" class="reset-btn">Reset Game</button>
        </div>

        <div class="super-board" id="super-board">
        </div>

        <div class="game-status" id="game-status">
            Make your move!
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
